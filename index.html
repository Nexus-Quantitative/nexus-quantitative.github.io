<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts: Inter & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <title>Nexus Quant | Algorithmic Trading Lab</title>
  <meta name="description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:title" content="Nexus Quant | Algorithmic Trading Lab" />
  <meta property="og:description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:type" content="website" />
  
  <style>
    /* Prevent initial white page flash (FOUC) and set baseline background/color */
    html, body {
      background-color: #000000;
      color: #ffffff;
      margin: 0;
      padding: 0;
    }
  </style>

  <script>
    // Aplicar tema imediatamente no carregamento inicial
    try {
      const mode = localStorage.getItem('theme-mode') || 'dark';
      document.documentElement.setAttribute('data-mode', mode);

      if (mode === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'vintage');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'skeleton');
      }
    } catch (e) {
      document.documentElement.setAttribute('data-mode', 'dark');
      document.documentElement.setAttribute('data-theme', 'vintage');
    }
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
