<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  
  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Google Fonts: Inter & JetBrains Mono -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <title>Nexus Quant | Algorithmic Trading Lab</title>
  <meta name="description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:title" content="Nexus Quant | Algorithmic Trading Lab" />
  <meta property="og:description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:type" content="website" />
  
  <style>
    /* Critical CSS to render typography, theme colors, and gradients instantly on first paint */
    :root {
      --color-void-black: #000000;
      --color-deep-abyss: #050508;
      --color-quantum-cyan: #00F0FF;
      --color-electric-blue: #4CC9F0;
      --color-synth-violet: #7209B7;
      --color-magenta-neon: #F72585;
      --color-starlight-white: #FFFFFF;

      --color-bg-primary: var(--color-void-black);
      --color-text-primary: var(--color-starlight-white);
      --color-text-secondary: var(--color-electric-blue);
      --color-accent: var(--color-quantum-cyan);

      --font-mono: "JetBrains Mono", monospace;
      --font-body: "Inter", sans-serif;
    }

    html, body {
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6, .font-mono {
      font-family: var(--font-mono);
    }

    /* Style the main typography gradient immediately */
    .text-gradient-nexus {
      background: linear-gradient(to right, var(--color-synth-violet), var(--color-magenta-neon), var(--color-quantum-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }
  </style>

  <script>
    // Aplicar tema imediatamente no carregamento inicial
    try {
      const mode = localStorage.getItem('theme-mode') || 'dark';
      document.documentElement.setAttribute('data-mode', mode);

      if (mode === 'dark') {
        document.documentElement.classList.add('dark');
        document.documentElement.setAttribute('data-theme', 'vintage');
      } else {
        document.documentElement.classList.remove('dark');
        document.documentElement.setAttribute('data-theme', 'skeleton');
      }
    } catch (e) {
      document.documentElement.setAttribute('data-mode', 'dark');
      document.documentElement.setAttribute('data-theme', 'vintage');
    }
  </script>
</head>

<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>

</html>
