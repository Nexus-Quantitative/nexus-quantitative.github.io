<!DOCTYPE html>
<html lang="en" style="background:#000;color:#fff;color-scheme:dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#000000" />
  <meta name="darkreader-lock" content="true" />

  <!-- Critical: black background before anything else loads -->
  <style>
    :root {
      color-scheme: dark;
      --color-void-black: #000000;
      --color-deep-abyss: #050508;
      --color-quantum-cyan: #00F0FF;
      --color-electric-blue: #4CC9F0;
      --color-synth-violet: #7209B7;
      --color-magenta-neon: #F72585;
      --color-starlight-white: #FFFFFF;
      --color-bg-primary: #000000;
      --color-text-primary: #ffffff;
      --color-text-secondary: #4CC9F0;
      --color-accent: #00F0FF;
      --font-mono: "JetBrains Mono", monospace;
      --font-body: "Inter", sans-serif;
    }

    /* No background transition on load — prevents white→dark flash */
    html, body, #app {
      transition: none !important;
    }

    html, body, #app {
      background: #000000 !important;
      color: #ffffff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5, h6, .font-mono {
      font-family: var(--font-mono);
    }

    .text-gradient-nexus {
      background: linear-gradient(to right, var(--color-synth-violet), var(--color-magenta-neon), var(--color-quantum-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }
  </style>

  <script>
    // Lock to dark mode always — no localStorage toggle
    try {
      document.documentElement.setAttribute('data-mode', 'dark');
      document.documentElement.classList.add('dark');
      document.documentElement.setAttribute('data-theme', 'vintage');
    } catch (e) {}
  </script>

  <!-- Fonts (non-blocking) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <title>Nexus Quant | Algorithmic Trading Lab</title>
  <meta name="description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:title" content="Nexus Quant | Algorithmic Trading Lab" />
  <meta property="og:description" content="Proprietary Quantitative Research & Automated Decision Systems." />
  <meta property="og:type" content="website" />
  <script type="module" crossorigin src="./assets/index-f0M-wg2G.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CiSpwlU7.css">
</head>

<body>
  <div id="app"></div>
</body>

</html>
